<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Galeria</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Galeria</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-grid>
    <ion-row>
      @for (photo of photoService.photos; track photo.filepath) {
        <ion-col size="6">
          <ion-img [src]="photo.webviewPath"></ion-img>
        </ion-col>
      }
    </ion-row>
  </ion-grid>
</ion-content>
